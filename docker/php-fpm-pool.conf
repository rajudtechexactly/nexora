; Replaces the default www pool for a memory-constrained (512MB) container.
; "ondemand" spawns workers only when needed and reaps idle ones, keeping the
; baseline footprint low so Reverb + the queue worker have headroom.
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = ondemand
pm.max_children = 4
pm.process_idle_timeout = 10s
pm.max_requests = 300

clear_env = no
catch_workers_output = yes
