; Nexora production PHP settings — tuned for Render's 512MB free instance,
; where nginx + php-fpm + queue worker + Reverb must coexist.
memory_limit = 192M
upload_max_filesize = 50M
post_max_size = 52M
max_execution_time = 120
expose_php = Off

; OPcache — production (smaller buffers to leave RAM for Reverb + worker)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 64
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 12000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
